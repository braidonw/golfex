<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 48" fill="none" aria-hidden="true">
  <!-- Golf flag/pin icon -->
  <g transform="translate(4, 2)">
    <!-- Flag pole -->
    <rect x="14" y="4" width="2.5" height="36" rx="1.25" fill="currentColor"/>
    <!-- Flag -->
    <path d="M16.5 4 L38 12 L16.5 20Z" fill="#16a34a"/>
    <!-- Ground/base -->
    <ellipse cx="15" cy="42" rx="12" ry="3" fill="currentColor" opacity="0.3"/>
    <!-- Golf ball -->
    <circle cx="28" cy="38" r="5" fill="currentColor" opacity="0.85"/>
    <circle cx="26.5" cy="36.5" r="1" fill="white" opacity="0.4"/>
  </g>
  <!-- Text: Golfex -->
  <text x="52" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="700" fill="currentColor" letter-spacing="-0.5">
    Golf<tspan fill="#16a34a">ex</tspan>
  </text>
</svg>
